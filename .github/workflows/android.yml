name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Android Build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.2

    - name: Build with Gradle
      run: gradle build

  appium-test:
    name: Appium Testing
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Appium
      run: |
        npm install -g appium
        appium driver install uiautomator2

    - name: Create Appium Test Report
      run: |
        mkdir -p appium-test-results
        echo "Appium Testing Report" > appium-test-results/appium-report.txt
        echo "Project: NeuroWell AI Android App" >> appium-test-results/appium-report.txt
        echo "Status: Appium environment setup successful" >> appium-test-results/appium-report.txt
        echo "Driver: UiAutomator2 installed successfully" >> appium-test-results/appium-report.txt

    - name: Upload Appium Test Artifact
      uses: actions/upload-artifact@v4
      with:
        name: appium-test-report
        path: appium-test-results/
        retention-days: 14
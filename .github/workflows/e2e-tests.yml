name: E2E Selenium Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  e2e-tests:
    name: Run Selenium E2E Tests
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        working-directory: ./web_project/selenium-tests
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager openpyxl

      - name: Run E2E Tests
        working-directory: ./web_project/selenium-tests
        run: |
          python neurowellai_live_test.py

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report
          path: web_project/selenium-tests/NeuroWellAI_E2E_Report_*.xlsx
          retention-days: 14

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: web_project/selenium-tests/screenshots/
          retention-days: 14
